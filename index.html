<!doctype html>
<html lang="mn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Надтай үерхэх үү? ❤️</title>

<style>

*{box-sizing:border-box}

body{
margin:0;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
font-family:Arial;
background:linear-gradient(135deg,#ffe4ec,#ffd6e7,#fff0f5);
color:#7a1f47;
}

.hearts,.confetti,.fireworks{
position:fixed;
inset:0;
pointer-events:none;
overflow:hidden;
}

.heart{
position:absolute;
bottom:-30px;
font-size:20px;
animation:floatUp linear forwards;
}

@keyframes floatUp{
from{transform:translateY(0)}
to{transform:translateY(-110vh);opacity:0}
}

.card{
width:min(92vw,720px);
background:white;
border-radius:25px;
padding:40px;
text-align:center;
box-shadow:0 24px 60px rgba(0,0,0,0.18);
}

.emoji{
font-size:70px;
margin-bottom:10px;
}

h1{
color:#e91e63;
}

.buttons-wrap{
margin-top:30px;
position:relative;
height:150px;
}

.btn{
border:none;
padding:16px 28px;
font-size:20px;
border-radius:999px;
cursor:pointer;
font-weight:700;
}

#yesBtn{
background:#e91e63;
color:white;
}

#noBtn{
background:white;
border:2px solid pink;
position:absolute;
left:55%;
}

#message{
margin-top:20px;
font-size:24px;
font-weight:bold;
color:#e91e63;
}

.footer{
margin-top:20px;
font-size:13px;
color:#c06a90;
}

.confetti-piece{
position:absolute;
width:10px;
height:16px;
animation:confettiFall linear forwards;
}

@keyframes confettiFall{
to{
transform:translateY(110vh) rotate(720deg);
opacity:0
}
}

.firework{
position:absolute;
width:8px;
height:8px;
border-radius:50%;
animation:explode 1.2s forwards;
}

@keyframes explode{
to{
transform:translate(var(--x),var(--y));
opacity:0
}
}

</style>
</head>

<body>

<div class="hearts" id="hearts"></div>
<div class="confetti" id="confetti"></div>
<div class="fireworks" id="fireworks"></div>

<div class="card">

<div class="emoji">🥺❤️</div>

<h1 id="title">Надтай үерхэх үү?</h1>

<p id="mainText">
Чамтай өнгөрүүлсэн мөч бүр надад үнэхээр онцгой байдаг.
</p>

<div class="buttons-wrap">

<button class="btn" id="yesBtn">Тийм 💖</button>

<button class="btn" id="noBtn">Үгүй 🙈</button>

</div>

<div id="message"></div>

<div class="footer">Made with love by Baterdene</div>

</div>

<audio id="bgMusic" loop>
<source src="https://cdn.pixabay.com/audio/2023/03/27/audio_6c6f3f6e0e.mp3" type="audio/mpeg">
</audio>

<script>

const yesBtn=document.getElementById("yesBtn")
const noBtn=document.getElementById("noBtn")
const message=document.getElementById("message")
const title=document.getElementById("title")
const hearts=document.getElementById("hearts")
const confetti=document.getElementById("confetti")
const fireworks=document.getElementById("fireworks")
const music=document.getElementById("bgMusic")

function moveNo(){

const x=Math.random()*200
const y=Math.random()*100

noBtn.style.left=x+"px"
noBtn.style.top=y+"px"

}

noBtn.addEventListener("mouseenter",moveNo)

function heartBurst(){

for(let i=0;i<25;i++){

const h=document.createElement("div")
h.className="heart"
h.innerHTML=Math.random()>0.5?"❤️":"💖"

h.style.left=Math.random()*100+"vw"
h.style.animationDuration=3+Math.random()*2+"s"

hearts.appendChild(h)

setTimeout(()=>h.remove(),5000)

}

}

function confettiBurst(){

const colors=["#ff4d6d","#ffd166","#7bdff2","#b8f2e6"]

for(let i=0;i<80;i++){

const c=document.createElement("div")
c.className="confetti-piece"

c.style.left=Math.random()*100+"vw"
c.style.background=colors[Math.floor(Math.random()*colors.length)]
c.style.animationDuration=2+Math.random()*2+"s"

confetti.appendChild(c)

setTimeout(()=>c.remove(),4000)

}

}

function firework(x,y){

for(let i=0;i<25;i++){

const f=document.createElement("div")
f.className="firework"

f.style.left=x+"px"
f.style.top=y+"px"
f.style.background="white"

const angle=(Math.PI*2*i)/25
const dist=60+Math.random()*50

f.style.setProperty("--x",Math.cos(angle)*dist+"px")
f.style.setProperty("--y",Math.sin(angle)*dist+"px")

fireworks.appendChild(f)

setTimeout(()=>f.remove(),1200)

}

}

function randomFirework(){

const x=Math.random()*window.innerWidth
const y=Math.random()*window.innerHeight/2

firework(x,y)

}

yesBtn.onclick=()=>{

title.style.display="none"

message.innerHTML="Yayyy ❤️"

yesBtn.textContent="Хайртай шүү 💕"

noBtn.style.display="none"

music.play()

heartBurst()

confettiBurst()

setInterval(heartBurst,1000)

setInterval(confettiBurst,2000)

setInterval(randomFirework,1500)

}

</script>

</body>
</html>
