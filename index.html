<!doctype html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Надтай үерхэх үү? ❤️</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: #fff;
      position: relative;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.15), transparent 18%),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,0.12), transparent 20%),
        radial-gradient(circle at 50% 10%, rgba(255,192,203,0.12), transparent 22%),
        linear-gradient(180deg, #0d1026 0%, #14193a 35%, #1f1a45 70%, #2e1b4f 100%);
    }

    .stars,
    .hearts,
    .confetti,
    .fireworks,
    .floating-rings {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 8px rgba(255,255,255,0.9);
      animation: twinkle 2.4s infinite ease-in-out;
    }

    .star.big {
      width: 5px;
      height: 5px;
      box-shadow: 0 0 14px rgba(255,255,255,1);
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.25; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.4); }
    }

    .shooting-star {
      position: absolute;
      width: 120px;
      height: 2px;
      background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,0.9));
      border-radius: 999px;
      transform: rotate(-25deg);
      opacity: 0;
      animation: shooting 5s linear infinite;
    }

    @keyframes shooting {
      0% { transform: translate(-20vw, -10vh) rotate(-25deg); opacity: 0; }
      10% { opacity: 1; }
      35% { transform: translate(80vw, 45vh) rotate(-25deg); opacity: 0; }
      100% { opacity: 0; }
    }

    .moon {
      position: fixed;
      top: 44px;
      right: 52px;
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fffdf5 0%, #fff0be 55%, #f7d98d 100%);
      box-shadow: 0 0 35px rgba(255, 235, 160, 0.45);
      z-index: 1;
      pointer-events: none;
    }

    .moon::after {
      content: '';
      position: absolute;
      top: 12px;
      left: 18px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: rgba(220, 205, 160, 0.22);
      box-shadow: 20px 14px 0 4px rgba(220, 205, 160, 0.18), 10px 38px 0 2px rgba(220, 205, 160, 0.15);
    }

    .heart {
      position: absolute;
      bottom: -30px;
      font-size: 20px;
      animation: floatUp linear forwards;
      opacity: 0.85;
    }

    @keyframes floatUp {
      from { transform: translateY(0) scale(1); opacity: 0.95; }
      to { transform: translateY(-110vh) scale(1.6); opacity: 0; }
    }

    .card {
      width: min(92vw, 760px);
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 30px;
      padding: 42px 28px;
      text-align: center;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
      position: relative;
      z-index: 3;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .emoji {
      font-size: 72px;
      line-height: 1;
      margin-bottom: 14px;
      animation: bounce 1.8s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 6vw, 54px);
      color: #ff8ec5;
      text-shadow: 0 0 18px rgba(255, 105, 180, 0.25);
    }

    p {
      margin: 18px auto 0;
      font-size: clamp(16px, 2.8vw, 22px);
      line-height: 1.6;
      color: #ffe5f1;
      max-width: 560px;
    }

    .love-name {
      margin-top: 18px;
      font-size: clamp(22px, 5vw, 40px);
      font-weight: 800;
      color: #ffd7eb;
      opacity: 0;
      transform: scale(0.8);
      transition: all 0.8s ease;
      text-shadow: 0 0 18px rgba(255, 120, 180, 0.35);
      min-height: 54px;
    }

    .love-name.show {
      opacity: 1;
      transform: scale(1);
      animation: namePulse 1.6s infinite alternate;
    }

    @keyframes namePulse {
      from { letter-spacing: 0.5px; transform: scale(1); }
      to { letter-spacing: 2px; transform: scale(1.03); }
    }

    .ring-wrap {
      margin-top: 16px;
      min-height: 82px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring-scene {
      position: relative;
      width: 140px;
      height: 80px;
      opacity: 0;
      transform: scale(0.7);
      transition: all 0.8s ease;
    }

    .ring-scene.show {
      opacity: 1;
      transform: scale(1);
    }

    .ring {
      position: absolute;
      left: 50%;
      top: 22px;
      transform: translateX(-50%);
      width: 60px;
      height: 60px;
      border: 7px solid #ffd86f;
      border-radius: 50%;
      box-shadow: 0 0 20px rgba(255, 216, 111, 0.42);
      animation: ringFloat 2s ease-in-out infinite;
    }

    .ring::before {
      content: '';
      position: absolute;
      top: -16px;
      left: 50%;
      transform: translateX(-50%) rotate(45deg);
      width: 18px;
      height: 18px;
      background: linear-gradient(135deg, #ffffff, #ffdff1);
      box-shadow: 0 0 16px rgba(255,255,255,0.85);
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      border-radius: 2px;
      animation: diamondSparkle 1.2s ease-in-out infinite alternate;
    }

    .ring::after {
      content: '💍';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 54px;
      opacity: 0.95;
      filter: drop-shadow(0 0 10px rgba(255,216,111,0.35));
    }

    @keyframes ringFloat {
      0%,100% { transform: translateX(-50%) translateY(0) rotate(0deg); }
      50% { transform: translateX(-50%) translateY(-8px) rotate(2deg); }
    }

    @keyframes diamondSparkle {
      from { transform: translateX(-50%) rotate(45deg) scale(1); opacity: 0.8; }
      to { transform: translateX(-50%) rotate(45deg) scale(1.18); opacity: 1; }
    }

    .buttons-wrap {
      position: relative;
      width: 100%;
      height: 180px;
      margin-top: 30px;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 16px 28px;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      box-shadow: 0 10px 22px rgba(0,0,0,0.18);
    }

    .btn:hover {
      transform: translateY(-2px) scale(1.03);
    }

    #yesBtn {
      background: linear-gradient(135deg, #ff2d7a, #ff4fa0);
      color: white;
      margin-right: 12px;
    }

    #noBtn {
      background: rgba(255,255,255,0.92);
      color: #e91e63;
      border: 2px solid #ffc1dd;
      position: absolute;
      left: calc(50% + 30px);
      top: 0;
    }

    #message {
      margin-top: 18px;
      min-height: 56px;
      font-size: 24px;
      font-weight: 700;
      color: #ffd8ec;
    }

    .submessage {
      margin-top: 8px;
      font-size: 17px;
      color: #ffe6f2;
      min-height: 28px;
    }

    .footer {
      margin-top: 18px
