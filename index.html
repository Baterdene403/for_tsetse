<!doctype html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Надтай үерхэх үү? ❤️</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: #fff;
      position: relative;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.15), transparent 18%),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,0.12), transparent 20%),
        radial-gradient(circle at 50% 10%, rgba(255,192,203,0.12), transparent 22%),
        linear-gradient(180deg, #0d1026 0%, #14193a 35%, #1f1a45 70%, #2e1b4f 100%);
    }

    .stars,
    .hearts,
    .confetti,
    .fireworks,
    .floating-rings {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 8px rgba(255,255,255,0.9);
      animation: twinkle 2.4s infinite ease-in-out;
    }

    .star.big {
      width: 5px;
      height: 5px;
      box-shadow: 0 0 14px rgba(255,255,255,1);
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.25; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.4); }
    }

    .shooting-star {
      position: absolute;
      width: 120px;
      height: 2px;
      background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,0.9));
      border-radius: 999px;
      transform: rotate(-25deg);
      opacity: 0;
      animation: shooting 5s linear infinite;
    }

    @keyframes shooting {
      0% { transform: translate(-20vw, -10vh) rotate(-25deg); opacity: 0; }
      10% { opacity: 1; }
      35% { transform: translate(80vw, 45vh) rotate(-25deg); opacity: 0; }
      100% { opacity: 0; }
    }

    .moon {
      position: fixed;
      top: 44px;
      right: 52px;
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fffdf5 0%, #fff0be 55%, #f7d98d 100%);
      box-shadow: 0 0 35px rgba(255, 235, 160, 0.45);
      z-index: 1;
      pointer-events: none;
    }

    .moon::after {
      content: '';
      position: absolute;
      top: 12px;
      left: 18px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: rgba(220, 205, 160, 0.22);
      box-shadow: 20px 14px 0 4px rgba(220, 205, 160, 0.18), 10px 38px 0 2px rgba(220, 205, 160, 0.15);
    }

    .heart {
      position: absolute;
      bottom: -30px;
      font-size: 20px;
      animation: floatUp linear forwards;
      opacity: 0.85;
    }

    @keyframes floatUp {
      from { transform: translateY(0) scale(1); opacity: 0.95; }
      to { transform: translateY(-110vh) scale(1.6); opacity: 0; }
    }

    .card {
      width: min(92vw, 760px);
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 30px;
      padding: 42px 28px;
      text-align: center;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
      position: relative;
      z-index: 3;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .emoji {
      font-size: 72px;
      line-height: 1;
      margin-bottom: 14px;
      animation: bounce 1.8s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 6vw, 54px);
      color: #ff8ec5;
      text-shadow: 0 0 18px rgba(255, 105, 180, 0.25);
    }

    p {
      margin: 18px auto 0;
      font-size: clamp(16px, 2.8vw, 22px);
      line-height: 1.6;
      color: #ffe5f1;
      max-width: 560px;
    }

    .love-name {
      margin-top: 18px;
      font-size: clamp(22px, 5vw, 40px);
      font-weight: 800;
      color: #ffd7eb;
      opacity: 0;
      transform: scale(0.8);
      transition: all 0.8s ease;
      text-shadow: 0 0 18px rgba(255, 120, 180, 0.35);
      min-height: 54px;
    }

    .love-name.show {
      opacity: 1;
      transform: scale(1);
      animation: namePulse 1.6s infinite alternate;
    }

    @keyframes namePulse {
      from { letter-spacing: 0.5px; transform: scale(1); }
      to { letter-spacing: 2px; transform: scale(1.03); }
    }

    .buttons-wrap {
      position: relative;
      width: 100%;
      height: 180px;
      margin-top: 30px;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 16px 28px;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      box-shadow: 0 10px 22px rgba(0,0,0,0.18);
    }

    .btn:hover {
      transform: translateY(-2px) scale(1.03);
    }

    #yesBtn {
      background: linear-gradient(135deg, #ff2d7a, #ff4fa0);
      color: white;
      margin-right: 12px;
    }

    #noBtn {
      background: rgba(255,255,255,0.92);
      color: #e91e63;
      border: 2px solid #ffc1dd;
      position: absolute;
      left: calc(50% + 30px);
      top: 0;
    }

    #message {
      margin-top: 18px;
      min-height: 56px;
      font-size: 24px;
      font-weight: 700;
      color: #ffd8ec;
    }

    .submessage {
      margin-top: 8px;
      font-size: 17px;
      color: #ffe6f2;
      min-height: 28px;
    }

    .footer {
      margin-top: 18px;
      font-size: 13px;
      color: rgba(255,255,255,0.72);
    }

    .confetti-piece {
      position: absolute;
      width: 10px;
      height: 18px;
      opacity: 0.95;
      top: -20px;
      animation: confettiFall linear forwards;
      border-radius: 2px;
    }

    @keyframes confettiFall {
      to {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0;
      }
    }

    .firework {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      opacity: 1;
      animation: explode 1.2s ease-out forwards;
    }

    @keyframes explode {
      from { transform: translate(0, 0) scale(1); opacity: 1; }
      to { transform: translate(var(--x), var(--y)) scale(0.2); opacity: 0; }
    }

    .glow {
      animation: pulseGlow 1.2s infinite alternate;
    }

    @keyframes pulseGlow {
      from { box-shadow: 0 10px 22px rgba(0,0,0,0.18), 0 0 0 rgba(255,45,122,0.0); }
      to { box-shadow: 0 12px 28px rgba(0,0,0,0.22), 0 0 22px rgba(255,45,122,0.45); }
    }

    .floating-ring {
      position: absolute;
      font-size: 24px;
      opacity: 0.75;
      animation: ringRise linear forwards;
    }

    @keyframes ringRise {
      from { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 0.85; }
      to { transform: translateY(-105vh) rotate(180deg) scale(1.25); opacity: 0; }
    }

    @media (max-width: 600px) {
      .card { padding: 32px 18px; }
      .buttons-wrap { height: 220px; }
      #yesBtn { margin-right: 0; }
      #noBtn { left: 58%; }
      #message { font-size: 22px; }
      .moon { width: 68px; height: 68px; right: 18px; top: 22px; }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="moon"></div>
  <div class="hearts" id="hearts"></div>
  <div class="confetti" id="confetti"></div>
  <div class="fireworks" id="fireworks"></div>
  <div class="floating-rings" id="floatingRings"></div>

  <div class="card" id="card">
    <div class="emoji">🥺❤️</div>
    <h1 id="title">Надтай үерхэх үү?</h1>

    <p id="mainText">
      Чамтай өнгөрүүлсэн мөч бүр надад үнэхээр онцгой байдаг. 💌
    </p>

    <div class="love-name" id="loveName">B ❤️ Ts </div>

    <div class="buttons-wrap" id="buttonsWrap">
      <button class="btn glow" id="yesBtn">Тийм 💖</button>
      <button class="btn" id="noBtn">Үгүй 🙈</button>
    </div>

    <div id="message"></div>
    <div class="submessage" id="submessage"></div>
    <div class="footer">Made with love by Baterdene</div>
  </div>

  <audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <script>
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const title = document.getElementById('title');
    const message = document.getElementById('message');
    const submessage = document.getElementById('submessage');
    const hearts = document.getElementById('hearts');
    const confetti = document.getElementById('confetti');
    const fireworks = document.getElementById('fireworks');
    const buttonsWrap = document.getElementById('buttonsWrap');
    const music = document.getElementById('bgMusic');
    const mainText = document.getElementById('mainText');
    const stars = document.getElementById('stars');
    const loveName = document.getElementById('loveName');
    const floatingRings = document.getElementById('floatingRings');

    let yesScale = 1;
    let celebrationStarted = false;

    function createStars() {
      for (let i = 0; i < 80; i++) {
        const star = document.createElement('div');
        star.className = 'star' + (Math.random() > 0.82 ? ' big' : '');
        star.style.left = Math.random() * 100 + 'vw';
        star.style.top = Math.random() * 100 + 'vh';
        star.style.animationDelay = Math.random() * 2.4 + 's';
        star.style.animationDuration = (1.8 + Math.random() * 2.8) + 's';
        stars.appendChild(star);
      }

      for (let i = 0; i < 3; i++) {
        const s = document.createElement('div');
        s.className = 'shooting-star';
        s.style.top = (10 + i * 18) + 'vh';
        s.style.left = (-20 - i * 12) + 'vw';
        s.style.animationDelay = (i * 2.2) + 's';
        s.style.animationDuration = (5 + i) + 's';
        stars.appendChild(s);
      }
    }

    function moveNoButton() {
      const wrapRect = buttonsWrap.getBoundingClientRect();
      const btnRect = noBtn.getBoundingClientRect();

      const maxX = Math.max(0, wrapRect.width - btnRect.width);
      const maxY = Math.max(0, wrapRect.height - btnRect.height);

      const randomX = Math.floor(Math.random() * (maxX + 1));
      const randomY = Math.floor(Math.random() * (maxY + 1));

      noBtn.style.left = randomX + 'px';
      noBtn.style.top = randomY + 'px';

      yesScale += 0.12;
      yesBtn.style.transform = `scale(${yesScale})`;
    }

    function createHeartBurst(count = 28) {
      for (let i = 0; i < count; i++) {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.textContent = Math.random() > 0.5 ? '❤️' : '💖';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.animationDuration = (3 + Math.random() * 3) + 's';
        heart.style.fontSize = (18 + Math.random() * 26) + 'px';
        hearts.appendChild(heart);
        setTimeout(() => heart.remove(), 6500);
      }
    }

    function createFloatingRings(count = 8) {
      for (let i = 0; i < count; i++) {
        const item = document.createElement('div');
        item.className = 'floating-ring';
        item.textContent = '💍';
        item.style.left = Math.random() * 100 + 'vw';
        item.style.bottom = '-30px';
        item.style.animationDuration = (4 + Math.random() * 3) + 's';
        item.style.fontSize = (20 + Math.random() * 18) + 'px';
        floatingRings.appendChild(item);
        setTimeout(() => item.remove(), 7200);
      }
    }

    function createConfetti(count = 80) {
      const colors = ['#ff4d6d', '#ff85a1', '#ffd166', '#7bdff2', '#b8f2e6', '#c77dff', '#ffffff'];
      for (let i = 0; i < count; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = (2.5 + Math.random() * 2.5) + 's';
        piece.style.transform = `translateY(0) rotate(${Math.random() * 360}deg)`;
        confetti.appendChild(piece);
        setTimeout(() => piece.remove(), 5200);
      }
    }

    function createFireworkBurst(x, y) {
      const colors = ['#ff4d6d', '#ffd166', '#ffffff', '#ff85a1', '#7bdff2', '#c77dff'];
      const particles = 28;

      for (let i = 0; i < particles; i++) {
        const spark = document.createElement('div');
        spark.className = 'firework';
        spark.style.left = x + 'px';
        spark.style.top = y + 'px';
        spark.style.background = colors[Math.floor(Math.random() * colors.length)];

        const angle = (Math.PI * 2 * i) / particles;
        const distance = 50 + Math.random() * 90;
        spark.style.setProperty('--x', Math.cos(angle) * distance + 'px');
        spark.style.setProperty('--y', Math.sin(angle) * distance + 'px');

        fireworks.appendChild(spark);
        setTimeout(() => spark.remove(), 1300);
      }
    }

    function launchRandomFireworks() {
      const x = Math.random() * window.innerWidth * 0.9 + window.innerWidth * 0.05;
      const y = Math.random() * window.innerHeight * 0.45 + 40;
      createFireworkBurst(x, y);
    }

    async function playMusic() {
      try {
        music.volume = 0.45;
        await music.play();
      } catch (err) {
        submessage.textContent = 'Хөгжим тоглуулахын тулд music.mp3 файлаа repo дээрээ upload хийгээрэй 🎵';
      }
    }

    function startCelebration() {
      if (celebrationStarted) return;
      celebrationStarted = true;

      title.style.display = 'none';
      loveName.classList.add('show');

      message.innerHTML = 'MMMMM ddadada ❤️';
      submessage.textContent = 'Зөндөө гоё дурсамж бүтээе';
      document.querySelector('.emoji').textContent = '😍🌙';
      mainText.textContent = '';

      noBtn.style.display = 'none';
      yesBtn.textContent = 'Хайртай шүү 💕';
      yesBtn.style.transform = 'scale(1.18)';

      createHeartBurst(50);
      createFloatingRings(12);
      createConfetti(120);
      for (let i = 0; i < 5; i++) {
        setTimeout(() => launchRandomFireworks(), i * 240);
      }

      setInterval(() => createHeartBurst(12), 900);
      setInterval(() => {
        createConfetti(26);
        launchRandomFireworks();
      }, 1400);
      setInterval(() => createFloatingRings(3), 2000);

      playMusic();
    }

    noBtn.addEventListener('mouseenter', moveNoButton);
    noBtn.addEventListener('click', moveNoButton);
    noBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      moveNoButton();
    }, { passive: false });

    yesBtn.addEventListener('click', startCelebration);

    createStars();
    createHeartBurst(10);
  </script>
</body>
</html>
