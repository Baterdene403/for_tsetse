<!doctype html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Web</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7ff, #eef2ff);
      color: #1f2937;
    }
    .container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 720px;
      width: 100%;
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
      text-align: center;
    }
    h1 {
      font-size: 42px;
      margin: 0 0 12px;
    }
    p {
      font-size: 18px;
      line-height: 1.6;
      margin: 0 0 24px;
      color: #4b5563;
    }
    .buttons {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    a.button {
      text-decoration: none;
      padding: 14px 22px;
      border-radius: 999px;
      font-weight: 700;
      transition: transform .2s ease, opacity .2s ease;
    }
    a.button:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }
    .primary {
      background: #111827;
      color: white;
    }
    .secondary {
      background: #e5e7eb;
      color: #111827;
    }
    .footer {
      margin-top: 28px;
      font-size: 14px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Сайн уу 👋</h1>
      <p>
        Энэ бол GitHub Pages дээр байршуулахад бэлэн жижигхэн веб сайт.
        Гарчиг, тайлбар, товчнуудыг хүссэнээрээ солиод шууд ашиглаж болно.
      </p>
      <div class="buttons">
        <a class="button primary" href="https://github.com" target="_blank" rel="noopener noreferrer">GitHub</a>
        <a class="button secondary" href="mailto:hello@example.com">Холбогдох</a>
      </div>
      <div class="footer">Built with simple HTML + CSS</div>
    </div>
  </div>
</body>
</html>
